services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elyon_api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"

  postgres:
    image: postgres:16
    container_name: elyon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas_pass}
      POSTGRES_DB: ${POSTGRES_DB:-saas_db}
    volumes:
      - elyon_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: elyon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  elyon_pgdata:
